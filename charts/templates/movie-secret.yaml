apiVersion: v1
kind: Secret
metadata:
  name: movie-db-secret
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.movieDb.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.movieDb.password | quote }}
  POSTGRES_DB: {{ .Values.movieDb.database | quote }}
  DATABASE_URI: {{ printf "postgresql://%s:%s@%s/%s" .Values.movieDb.username .Values.movieDb.password .Values.movieDb.name .Values.movieDb.database | quote }}